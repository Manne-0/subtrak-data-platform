version: 2

models:
  - name: billing_cycles
    description: "Generates expected 30-day billing cycles for subscription contracts."
    columns:
      - name: contract_id
        description: "Unique contract identifier"
        tests:
          - not_null
      - name: start_date
        description: "Sign up date for contracts"    
      - name: billing_date
        description: "Expected date of billing event"
      - name: billing_no
        description: "Sequential billing cycle number"
      - name: deal_duration
        description: "Expected payment months for this contract"



  - name: payment_log
    description: >
      Tracks payments converted to "paid months" - handles irregular payment amounts and converts them into standardized monthly periods.

      **Key Logic**:
      - Cumulative payment tracking
      - Paid months calculation based on total_paid vs monthly_payment
      - Uses generate_series to expand to individual month records

    columns:
      - name: contract_id
        description: >
           Unique contract identifier associated with the payment. 
           Foreign key to contracts
        tests:
          - not_null
          - relationships:
              to: ref('stg_contracts')
              field: contract_id

      - name: start_date
        description: "Date when the contract came into the business."
        tests:
          - not_null

      - name: payment_date
        description: "Date when the payment was recorded."
        tests:
          - not_null

      - name: paid_months
        description: "Cumulative months paid (calculated from total_paid / monthly_payment)"
        tests:
          - not_null

      - name: total_paid
        description: "Running cumulative total of all payments for the contract as of the payment date."
        tests:
          - not_null

      - name: paid_diff
        description: "Difference between paid_months at different payment date (indicates an advanced or one payment). Used for billing alignment and cycle expansion."

      - name: payment_rank
        description: "payment counts or No. (used for billing alignment)."



  - name: contract_acq
    description: >
      Fact table at contract-level granularity capturing acquisition performance. 
      Includes deal type, cost price, setup amount, commission rate, commission amount, 
      acquisition month, rep, region, and customer linkages. 
      Serves as a central fact for sales, incentive, and performance analytics.

    columns:
      - name: contract_id
        description: "Primary business key representing each contract."
        tests:
          - not_null
          - unique
          - relationships:
              to: ref('stg_contracts')
              field: contract_id

      - name: sales_rep_id
        description: "Identifier of the representative responsible for acquiring the contract."
        tests:
          - not_null
          - relationships:
              to: ref('stg_reps')
              field: sales_rep_id

      - name: region_id
        description: "Region assigned to the rep responsible for the contract."
        tests:
          - not_null
          - relationships:
              to: ref('stg_regions')
              field: region_id

      - name: customer_id
        description: "Identifier of the customer who owns the contract."
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id

      - name: start_date
        description: "Date when the contract came into the business."

      - name: deal_id
        description: "Identifier of the type of deal (one-off or subscription)."
        tests:
          - not_null
          - relationships:
              to: ref('stg_deals')
              field: deal_id

      - name: plan
        description: "Readable label of deal type (e.g., One-off, Subscription)."
        tests:
          - accepted_values:
              values: ['One-Time Purchase', 'Subscription Plan']

      - name: cost_price
        description: "Full cost of the product."

      - name: setup_amount
        description: "Initial upfront fee for subscription deals."

      - name: commission_rate
        description: "Commission percentage applied based on deal type (5% or 17.5%)."

      - name: commission_amount
        description: "The actual monetary value paid as commission for closing the contract."
        tests:
          - not_null



  - name: fct_billing_cycle
    description: >
      Tracks expected vs actual payments for each contract billing cycle.
      Core table for understanding payment behavior, compliance, and rep performance.
          
      **Grain**: One row per contract per billing cycle (monthly for installment plans)
          
      **Business Logic**:
      - 30-day billing cycles
      - Cycle 0 = upfront payment
      - Cycles 1-N = monthly installments
      - Grace period: 5 days for rep incentive eligibility

      **Payment Timing Categories**:
      - On-time: Paid on or before due date
      - Grace period: Paid 1-5 days after due date (still qualifies for incentive)
      - Late: Paid 6+ days after due date

    columns:
      - name: contract_id
        description: "Foreign key to stg_contracts"
        tests:
          - not_null
          - relationships:
              to: ref('stg_contracts')
              field: contract_id

      - name: cycle_number
        description: "Billing cycle number (1=setup + first repayment, 2-12 = monthly repayment)"
        tests:
          - not_null

      - name: due_date
        description: "Date when payment is due"
        tests:
          - not_null

      - name: expected_amount
        description: "Amount expected to be paid in cycle"
        tests:
          - not_null

      - name: payment_date
        description: "Actual date payment was made (null if unpaid)"

      - name: amount_paid
        description: "Actual amount paid in the cycle. Null if unpaid."


      - name: payment_timing
        description: "Payment timing category: on-time, grace_period, late, or null if unpaid"
        tests:
          - accepted_values:
              values: ['on-time', 'grace_period', 'late']
              config:
                where: "payment_timing is not null"
