version: 2

models:
  - name: payment_log
    description: >
      Tracks payments converted to "paid months" - handles irregular payment amounts and converts them into standardized monthly periods.

      **Key Logic**:
      - Cumulative payment tracking
      - Paid months calculation based on total_paid vs monthly_payment
      - Uses generate_series to expand to individual month records

    columns:
      - name: contract_id
        description: >
           Unique contract identifier associated with the payment. 
           Foreign key to contracts
        tests:
          - not_null
          - relationships:
              to: ref('stg_contracts')
              field: contract_id

      - name: start_date
        description: "Date when the contract came into the business."
        tests:
          - not_null

      - name: payment_date
        description: "Date when the payment was recorded."
        tests:
          - not_null

      - name: paid_months
        description: "Cumulative months paid (calculated from total_paid / monthly_payment)"
        tests:
          - not_null

      - name: total_paid
        description: "Running cumulative total of all payments for the contract as of the payment date."
        tests:
          - not_null

      - name: paid_diff
        description: "Difference between paid_months at different payment date (indicates an advanced or one payment). Used for billing alignment and cycle expansion."

      - name: payment_rank
        description: "payment counts or No. (used for billing alignment)."



  - name: contract_acq
    description: >
      Fact table at contract-level granularity capturing acquisition performance. 
      Includes deal type, cost price, setup amount, commission rate, commission amount, 
      acquisition month, rep, region, and customer linkages. 
      Serves as a central fact for sales, incentive, and performance analytics.

    columns:
      - name: contract_id
        description: "Primary business key representing each contract."
        tests:
          - not_null
          - unique
          - relationships:
              to: ref('stg_contracts')
              field: contract_id

      - name: sales_rep_id
        description: "Identifier of the representative responsible for acquiring the contract."
        tests:
          - not_null
          - relationships:
              to: ref('stg_reps')
              field: sales_rep_id

      - name: region_id
        description: "Region assigned to the rep responsible for the contract."
        tests:
          - not_null
          - relationships:
              to: ref('stg_regions')
              field: region_id

      - name: customer_id
        description: "Identifier of the customer who owns the contract."
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id

      - name: start_date
        description: "Date when the contract came into the business."

      - name: deal_id
        description: "Identifier of the type of deal (one-off or subscription)."
        tests:
          - not_null
          - relationships:
              to: ref('stg_deals')
              field: deal_id

      - name: plan
        description: "Readable label of deal type (e.g., One-off, Subscription)."
        tests:
          - accepted_values:
              values: ['One-Time Purchase', 'Subscription Plan']

      - name: cost_price
        description: "Full cost of the product."

      - name: setup_amount
        description: "Initial upfront fee for subscription deals."

      - name: commission_rate
        description: "Commission percentage applied based on deal type (5% or 17.5%)."

      - name: commission_amount
        description: "The actual monetary value paid as commission for closing the contract."
        tests:
          - not_null



  - name: fct_billing_cycle
    description: >
      Tracks expected vs actual payments for each contract billing cycle.
      Core table for understanding payment behavior, compliance, and rep performance.
          
      **Grain**: One row per contract per billing cycle (monthly for installment plans)
          
      **Business Logic**:
      - 30-day billing cycles
      - Cycle 0 = upfront payment
      - Cycles 1-N = monthly installments
      - Grace period: 5 days for rep incentive eligibility

      **Payment Timing Categories**:
      - On-time: Paid on or before due date
      - Grace period: Paid 1-5 days after due date (still qualifies for incentive)
      - Late: Paid 6+ days after due date

    columns:
      - name: contract_id
        description: "Foreign key to stg_contracts"
        tests:
          - not_null
          - relationships:
              to: ref('stg_contracts')
              field: contract_id

      - name: cycle_number
        description: "Billing cycle number (1=setup + first repayment, 2-12 = monthly repayment)"
        tests:
          - not_null

      - name: due_date
        description: "Date when payment is due"
        tests:
          - not_null

      - name: expected_amount
        description: "Amount expected to be paid in cycle"
        tests:
          - not_null

      - name: payment_date
        description: "Actual date payment was made (null if unpaid)"

      - name: amount_paid
        description: "Actual amount paid in the cycle. Null if unpaid."


      - name: payment_timing
        description: "Payment timing category: on-time, grace_period, late, or null if unpaid"
        tests:
          - accepted_values:
              values: ['on-time', 'grace_period', 'late']
              config:
                where: "payment_timing is not null"


  - name: contract_status_current
    description: |
      **Contract Status Current** (adapted for payment_log)
      
      Single source of truth for current contract status and health metrics.
      
      **Grain**: One row per contract
      
      **System Status** (application-driven):
      - Enabled: Service active (current date < next due date)
      - Locked: Service suspended (payment overdue)
      - Retrieved: System repossessed from customer
      - Completed: All payments made
      
      **Business Status** (analytics classification):
      - Active: Contract ongoing, not in severe default
      - Owner: Completed all payments and past contract end date
      - Lost: 61+ days in default (business write-off)
      - Retrieved: Physically repossessed

      **Risk Categories**:
      - Good standing: 0-5 days overdue
      - Low risk: 6-30 days overdue
      - Medium risk: 31-60 days overdue
      - High risk: 61+ days overdue
      
      
    # tests:
    #   - dbt_utils.expression_is_true:
    #       expression: "total_amount_paid <= total_contract_value"
    #       config:
    #         severity: error
      

 
    columns:
      - name: contract_id
        description: "Unique contract identifier. Foreign key to stg_contracts"
        tests:
          - not_null
          - relationships:
              to: ref('stg_contracts')
              field: contract_id

      - name: customer_id
        description: "Foreign key to customer"
        tests:
          - not_null

      - name: sales_rep_id
        description: "Foreign key to sales representative"
        tests:
          - not_null

      - name: total_billing_cycles
        description: "billing cycles for the duration of contract. Equals to contract duration"


      - name: cycles_paid
        description: "Count of cycles paid for."

      - name: total_amount_paid
        description: "Total amount paid till date"


      - name: total_amount_outstanding
        description: "Total amount still owed"

      - name: ontime_payment
        description: "Count of times contract paid on time"

      - name: last_due_date
        description: "last billing date with payment"

      - name: last_payment_date
        description: "Date of last payment"        

      - name: days_overdue
        description: "Days overdue for payment. (0 if current or owner)"
        tests:
          - not_null
      
      - name: system_status
        description: "Current system status: enabled, locked, or completed"
        tests:
          - not_null
          - accepted_values:
              values: ['enabled', 'locked', 'completed', 'unknown']
    
      - name: contract_status
        description: "Business classification: active, owner, lost"
        tests:
          - not_null
          - accepted_values:
              values: ['active', 'owner', 'lost']

      - name: risk_category
        description: "Risk level: good_standing, low_risk, medium_risk, high_risk"
        tests:
          - not_null
          - accepted_values:
              values: ['good_standing', 'low_risk', 'medium_risk', 'high_risk']
   